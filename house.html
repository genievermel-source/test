<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Деревянный дом</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: linear-gradient(180deg, #87CEEB 0%, #b0e0ff 60%, #8BC34A 60%, #6fa832 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-end;
    padding-bottom: 40px;
    overflow: hidden;
    font-family: sans-serif;
  }

  /* Солнце */
  .sun {
    position: fixed;
    top: 40px;
    right: 120px;
    width: 70px;
    height: 70px;
    background: radial-gradient(circle, #FFE066, #FFB300);
    border-radius: 50%;
    box-shadow: 0 0 40px 15px #ffe06688;
    animation: sunPulse 4s ease-in-out infinite;
  }
  @keyframes sunPulse {
    0%,100% { box-shadow: 0 0 40px 15px #ffe06688; }
    50% { box-shadow: 0 0 60px 25px #ffe066aa; }
  }

  /* Облака */
  .cloud {
    position: fixed;
    top: 60px;
    background: white;
    border-radius: 50px;
    opacity: 0.85;
    animation: cloudMove linear infinite;
  }
  .cloud::before, .cloud::after {
    content: '';
    position: absolute;
    background: white;
    border-radius: 50%;
  }
  .cloud1 { width: 120px; height: 40px; left: -150px; animation-duration: 28s; animation-delay: 0s; }
  .cloud1::before { width: 60px; height: 55px; top: -25px; left: 15px; }
  .cloud1::after  { width: 45px; height: 40px; top: -15px; left: 55px; }
  .cloud2 { width: 90px; height: 30px; top: 100px; left: -120px; animation-duration: 38s; animation-delay: -12s; }
  .cloud2::before { width: 45px; height: 40px; top: -20px; left: 10px; }
  .cloud2::after  { width: 35px; height: 30px; top: -10px; left: 40px; }
  @keyframes cloudMove {
    from { transform: translateX(0); }
    to   { transform: translateX(110vw); }
  }

  /* Трава и цветы */
  .ground {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 80px;
  }
  .flower {
    position: absolute;
    bottom: 30px;
    font-size: 22px;
    animation: flowerSway 3s ease-in-out infinite;
    transform-origin: bottom center;
  }
  @keyframes flowerSway {
    0%,100% { transform: rotate(-5deg); }
    50% { transform: rotate(5deg); }
  }

  /* ===== ДОМ ===== */
  .scene {
    position: relative;
    width: 780px;
    height: 520px;
  }

  .house {
    position: absolute;
    bottom: 60px;
    left: 100px;
    width: 580px;
    height: 360px;
  }

  /* Основной корпус */
  .wall-main {
    position: absolute;
    bottom: 0;
    left: 80px;
    width: 420px;
    height: 250px;
    background: repeating-linear-gradient(
      180deg,
      #8B5E3C 0px, #8B5E3C 18px,
      #A0703F 18px, #A0703F 36px
    );
    border: 2px solid #6B4226;
    border-radius: 4px 4px 0 0;
  }

  /* Окна главного корпуса */
  .window {
    position: absolute;
    background: linear-gradient(135deg, #AEE6FF 0%, #7EC8E3 50%, #AEE6FF 100%);
    border: 3px solid #5C3D1E;
    border-radius: 3px;
  }
  .window::after {
    content: '';
    position: absolute;
    top: 0; left: 50%;
    width: 2px; height: 100%;
    background: #5C3D1E;
  }
  .window::before {
    content: '';
    position: absolute;
    top: 50%; left: 0;
    width: 100%; height: 2px;
    background: #5C3D1E;
  }
  .win1 { top: 50px; left: 40px; width: 80px; height: 70px; }
  .win2 { top: 50px; left: 160px; width: 80px; height: 70px; }
  .win3 { top: 50px; right: 40px; width: 80px; height: 70px; }

  /* Дверь главная */
  .door-main {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 55px;
    height: 90px;
    background: linear-gradient(180deg, #5C3D1E, #3E2810);
    border: 3px solid #2a1a08;
    border-radius: 5px 5px 0 0;
  }
  .door-main::after {
    content: '';
    position: absolute;
    top: 30px; right: 10px;
    width: 8px; height: 8px;
    background: #FFD700;
    border-radius: 50%;
  }

  /* Крыша главная */
  .roof-main {
    position: absolute;
    bottom: 248px;
    left: 60px;
    width: 0;
    height: 0;
    border-left: 230px solid transparent;
    border-right: 230px solid transparent;
    border-bottom: 140px solid #7B3F2A;
    filter: drop-shadow(0 -4px 8px rgba(0,0,0,0.3));
  }
  .roof-main::after {
    content: '';
    position: absolute;
    top: 5px;
    left: -220px;
    width: 0; height: 0;
    border-left: 220px solid transparent;
    border-right: 220px solid transparent;
    border-bottom: 130px solid #9B5533;
  }

  /* Труба */
  .chimney {
    position: absolute;
    bottom: 370px;
    left: 330px;
    width: 35px;
    height: 70px;
    background: repeating-linear-gradient(180deg, #8B4513 0, #8B4513 10px, #A0522D 10px, #A0522D 20px);
    border: 2px solid #5C3010;
  }
  .smoke {
    position: absolute;
    top: -10px;
    left: 5px;
    font-size: 28px;
    animation: smokeRise 2.5s ease-in-out infinite;
    opacity: 0.7;
  }
  .smoke2 { left: 12px; animation-delay: 0.8s; font-size: 22px; }
  @keyframes smokeRise {
    0% { transform: translateY(0) scale(1); opacity: 0.7; }
    100% { transform: translateY(-50px) scale(1.8); opacity: 0; }
  }

  /* ===== ВЕРАНДА ===== */
  .veranda {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 140px;
    height: 200px;
  }

  .veranda-floor {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 140px;
    height: 20px;
    background: repeating-linear-gradient(
      90deg,
      #A0703F 0px, #A0703F 22px,
      #8B5E3C 22px, #8B5E3C 44px
    );
    border: 2px solid #6B4226;
  }

  .veranda-post {
    position: absolute;
    bottom: 18px;
    width: 12px;
    background: repeating-linear-gradient(180deg, #C68642 0, #C68642 8px, #A0703F 8px, #A0703F 16px);
    border-radius: 3px 3px 0 0;
    border: 1px solid #6B4226;
  }
  .post1 { left: 10px; height: 160px; }
  .post2 { left: 60px; height: 160px; }
  .post3 { left: 118px; height: 160px; }

  /* Перила */
  .railing {
    position: absolute;
    bottom: 60px;
    left: 5px;
    width: 128px;
    height: 40px;
  }
  .railing-top {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 8px;
    background: #8B5E3C;
    border-radius: 4px;
  }
  .railing-bottom {
    position: absolute;
    bottom: 0; left: 0;
    width: 100%; height: 6px;
    background: #8B5E3C;
    border-radius: 3px;
  }
  .baluster {
    position: absolute;
    bottom: 5px;
    width: 5px;
    height: 28px;
    background: #A0703F;
    border-radius: 2px;
  }

  .veranda-roof {
    position: absolute;
    bottom: 178px;
    left: -10px;
    width: 0; height: 0;
    border-left: 80px solid transparent;
    border-right: 80px solid transparent;
    border-bottom: 50px solid #7B3F2A;
  }
  .veranda-roof::after {
    content: '';
    position: absolute;
    top: 3px; left: -74px;
    width: 0; height: 0;
    border-left: 74px solid transparent;
    border-right: 74px solid transparent;
    border-bottom: 44px solid #9B5533;
  }

  /* Ступеньки */
  .steps { position: absolute; bottom: 0; left: 20px; }
  .step {
    height: 12px;
    background: linear-gradient(180deg, #C68642, #A0703F);
    border: 1px solid #6B4226;
    border-radius: 2px;
    margin-bottom: 0;
  }
  .step1 { width: 80px; }
  .step2 { width: 70px; margin-left: 5px; }
  .step3 { width: 60px; margin-left: 10px; }

  /* Дерево */
  .tree {
    position: absolute;
    bottom: 60px;
    right: 20px;
  }
  .tree-trunk {
    width: 20px;
    height: 60px;
    background: linear-gradient(90deg, #5C3D1E, #8B5E3C, #5C3D1E);
    margin: 0 auto;
    border-radius: 3px;
  }
  .tree-top {
    width: 0; height: 0;
    border-left: 50px solid transparent;
    border-right: 50px solid transparent;
    border-bottom: 70px solid #2E7D32;
    margin-left: -40px;
  }
  .tree-top2 {
    width: 0; height: 0;
    border-left: 45px solid transparent;
    border-right: 45px solid transparent;
    border-bottom: 65px solid #388E3C;
    margin-left: -35px;
    margin-top: -45px;
  }
  .tree-top3 {
    width: 0; height: 0;
    border-left: 35px solid transparent;
    border-right: 35px solid transparent;
    border-bottom: 55px solid #43A047;
    margin-left: -25px;
    margin-top: -40px;
  }

  /* ===== ПЕРСОНАЖИ ===== */
  .person {
    position: absolute;
    display: flex;
    flex-direction: column;
    align-items: center;
    transition: transform 0.3s;
  }

  .head {
    border-radius: 50%;
    border: 2px solid #8B5E3C;
    position: relative;
  }
  .eye { position: absolute; background: #333; border-radius: 50%; }
  .mouth { position: absolute; background: #cc6666; border-radius: 50%; }
  .hair { position: absolute; top: -4px; border-radius: 50% 50% 0 0; }

  .body { border-radius: 5px 5px 10px 10px; position: relative; }
  .arm {
    position: absolute;
    border-radius: 5px;
    top: 5px;
    transform-origin: top center;
  }
  .leg { border-radius: 3px; }
  .legs { display: flex; gap: 4px; }

  /* МАМА */
  .mom { bottom: 80px; left: 25px; animation: momWalk 12s ease-in-out infinite; }
  @keyframes momWalk {
    0%   { left: 25px;  bottom: 80px; transform: scaleX(1); }
    15%  { left: 25px;  bottom: 155px; transform: scaleX(1); }
    25%  { left: 120px; bottom: 155px; transform: scaleX(1); }
    35%  { left: 200px; bottom: 100px; transform: scaleX(1); }
    45%  { left: 350px; bottom: 100px; transform: scaleX(1); }
    55%  { left: 450px; bottom: 100px; transform: scaleX(-1); }
    65%  { left: 300px; bottom: 100px; transform: scaleX(-1); }
    75%  { left: 180px; bottom: 155px; transform: scaleX(-1); }
    85%  { left: 80px;  bottom: 155px; transform: scaleX(-1); }
    95%  { left: 25px;  bottom: 155px; transform: scaleX(-1); }
    100% { left: 25px;  bottom: 80px;  transform: scaleX(1); }
  }

  .mom-head { width: 28px; height: 28px; background: #FDBCB4; }
  .mom-hair { width: 30px; height: 16px; background: #8B4513; left: -1px; }
  .mom-hair::after { content: ''; position: absolute; width: 10px; height: 18px; background: #8B4513; border-radius: 0 0 5px 5px; right: -2px; top: 8px; }
  .mom-eye1 { width: 4px; height: 4px; top: 10px; left: 6px; }
  .mom-eye2 { width: 4px; height: 4px; top: 10px; right: 6px; }
  .mom-mouth { width: 10px; height: 5px; bottom: 6px; left: 9px; }
  .mom-body { width: 26px; height: 40px; background: linear-gradient(180deg, #E91E63, #C2185B); margin-top: 2px; }
  .mom-skirt { width: 36px; height: 20px; background: #E91E63; border-radius: 0 0 10px 10px; margin-top: -2px; clip-path: polygon(0 0, 100% 0, 90% 100%, 10% 100%); }
  .mom-arm-l { width: 8px; height: 28px; background: #FDBCB4; left: -8px; animation: armSwingL 0.9s ease-in-out infinite; }
  .mom-arm-r { width: 8px; height: 28px; background: #FDBCB4; right: -8px; animation: armSwingR 0.9s ease-in-out infinite; }
  .mom-leg { width: 10px; height: 30px; background: #5C3D1E; border-radius: 3px; animation: legAnim 0.9s ease-in-out infinite; }
  .mom-leg:last-child { animation-delay: 0.45s; }
  .mom-shoe { width: 14px; height: 7px; background: #333; border-radius: 0 5px 5px 2px; margin-top: -2px; }

  /* ДОЧКА 1 */
  .daughter1 { bottom: 80px; left: 55px; animation: d1Walk 12s ease-in-out infinite; animation-delay: 1.5s; }
  @keyframes d1Walk {
    0%   { left: 55px;  bottom: 80px;  transform: scaleX(1); }
    10%  { left: 55px;  bottom: 155px; transform: scaleX(1); }
    20%  { left: 200px; bottom: 155px; transform: scaleX(1); }
    32%  { left: 280px; bottom: 100px; transform: scaleX(1); }
    44%  { left: 400px; bottom: 100px; transform: scaleX(1); }
    56%  { left: 500px; bottom: 100px; transform: scaleX(-1); }
    68%  { left: 350px; bottom: 100px; transform: scaleX(-1); }
    78%  { left: 220px; bottom: 155px; transform: scaleX(-1); }
    88%  { left: 100px; bottom: 155px; transform: scaleX(-1); }
    96%  { left: 55px;  bottom: 155px; transform: scaleX(-1); }
    100% { left: 55px;  bottom: 80px;  transform: scaleX(1); }
  }

  .d1-head { width: 24px; height: 24px; background: #FDBCB4; }
  .d1-hair { width: 26px; height: 13px; background: #FFD700; left: -1px; }
  .d1-hair::before { content: ''; position: absolute; width: 24px; height: 8px; background: #FFD700; border-radius: 0 0 8px 8px; top: 10px; }
  .d1-eye1 { width: 3px; height: 3px; top: 9px; left: 5px; }
  .d1-eye2 { width: 3px; height: 3px; top: 9px; right: 5px; }
  .d1-mouth { width: 8px; height: 4px; bottom: 5px; left: 8px; }
  .d1-body { width: 22px; height: 33px; background: linear-gradient(180deg, #9C27B0, #7B1FA2); margin-top: 2px; }
  .d1-skirt { width: 30px; height: 16px; background: #CE93D8; border-radius: 0 0 8px 8px; margin-top: -1px; clip-path: polygon(0 0, 100% 0, 88% 100%, 12% 100%); }
  .d1-arm-l { width: 7px; height: 24px; background: #FDBCB4; left: -7px; animation: armSwingL 0.85s ease-in-out infinite; }
  .d1-arm-r { width: 7px; height: 24px; background: #FDBCB4; right: -7px; animation: armSwingR 0.85s ease-in-out infinite; }
  .d1-leg { width: 8px; height: 24px; background: #4A2F1A; border-radius: 3px; animation: legAnim 0.85s ease-in-out infinite; }
  .d1-leg:last-child { animation-delay: 0.42s; }
  .d1-shoe { width: 12px; height: 6px; background: #E91E63; border-radius: 0 5px 5px 2px; margin-top: -1px; }

  /* ДОЧКА 2 */
  .daughter2 { bottom: 80px; left: 75px; animation: d2Walk 12s ease-in-out infinite; animation-delay: 3s; }
  @keyframes d2Walk {
    0%   { left: 75px;  bottom: 80px;  transform: scaleX(1); }
    12%  { left: 75px;  bottom: 155px; transform: scaleX(1); }
    22%  { left: 170px; bottom: 155px; transform: scaleX(1); }
    36%  { left: 250px; bottom: 100px; transform: scaleX(1); }
    48%  { left: 420px; bottom: 100px; transform: scaleX(1); }
    60%  { left: 480px; bottom: 100px; transform: scaleX(-1); }
    70%  { left: 320px; bottom: 100px; transform: scaleX(-1); }
    80%  { left: 200px; bottom: 155px; transform: scaleX(-1); }
    90%  { left: 110px; bottom: 155px; transform: scaleX(-1); }
    97%  { left: 75px;  bottom: 155px; transform: scaleX(-1); }
    100% { left: 75px;  bottom: 80px;  transform: scaleX(1); }
  }

  .d2-head { width: 20px; height: 20px; background: #FDBCB4; }
  .d2-hair { width: 22px; height: 12px; background: #8B4513; left: -1px; }
  .d2-hair::after { content: ''; position: absolute; width: 8px; height: 14px; background: #8B4513; border-radius: 0 0 4px 4px; right: -1px; top: 8px; }
  .d2-eye1 { width: 3px; height: 3px; top: 7px; left: 4px; }
  .d2-eye2 { width: 3px; height: 3px; top: 7px; right: 4px; }
  .d2-mouth { width: 7px; height: 4px; bottom: 4px; left: 6px; }
  .d2-body { width: 18px; height: 28px; background: linear-gradient(180deg, #FF9800, #F57C00); margin-top: 2px; }
  .d2-skirt { width: 26px; height: 14px; background: #FFCC80; border-radius: 0 0 7px 7px; margin-top: -1px; clip-path: polygon(0 0, 100% 0, 87% 100%, 13% 100%); }
  .d2-arm-l { width: 6px; height: 20px; background: #FDBCB4; left: -6px; animation: armSwingL 0.8s ease-in-out infinite; }
  .d2-arm-r { width: 6px; height: 20px; background: #FDBCB4; right: -6px; animation: armSwingR 0.8s ease-in-out infinite; }
  .d2-leg { width: 7px; height: 20px; background: #4A2F1A; border-radius: 3px; animation: legAnim 0.8s ease-in-out infinite; }
  .d2-leg:last-child { animation-delay: 0.4s; }
  .d2-shoe { width: 10px; height: 6px; background: #FF5722; border-radius: 0 4px 4px 2px; margin-top: -1px; }

  @keyframes armSwingL {
    0%,100% { transform: rotate(-20deg); }
    50% { transform: rotate(20deg); }
  }
  @keyframes armSwingR {
    0%,100% { transform: rotate(20deg); }
    50% { transform: rotate(-20deg); }
  }
  @keyframes legAnim {
    0%,100% { transform: rotate(-15deg); }
    50% { transform: rotate(15deg); }
  }

  /* Подпись */
  .label {
    position: fixed;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    color: #5C3D1E;
    font-size: 14px;
    font-weight: bold;
    text-shadow: 0 1px 2px rgba(255,255,255,0.7);
    letter-spacing: 1px;
  }
</style>
</head>
<body>

<div class="sun"></div>
<div class="cloud cloud1"></div>
<div class="cloud cloud2"></div>

<div class="ground">
  <div class="flower" style="left:5%">🌸</div>
  <div class="flower" style="left:12%; animation-delay:0.5s">🌼</div>
  <div class="flower" style="left:20%; animation-delay:1s">🌺</div>
  <div class="flower" style="left:72%; animation-delay:0.3s">🌸</div>
  <div class="flower" style="left:80%; animation-delay:0.8s">🌼</div>
  <div class="flower" style="left:88%; animation-delay:1.2s">🌻</div>
  <div class="flower" style="left:94%; animation-delay:0.6s">🌺</div>
</div>

<div class="scene">

  <div class="house">

    <!-- Труба -->
    <div class="chimney">
      <div class="smoke">💨</div>
      <div class="smoke smoke2">💨</div>
    </div>

    <!-- Крыша -->
    <div class="roof-main"></div>

    <!-- Стены -->
    <div class="wall-main">
      <div class="window win1"></div>
      <div class="window win2"></div>
      <div class="window win3"></div>
      <div class="door-main"></div>
    </div>

    <!-- Веранда -->
    <div class="veranda">
      <div class="veranda-roof"></div>
      <div class="veranda-post post1"></div>
      <div class="veranda-post post2"></div>
      <div class="veranda-post post3"></div>
      <div class="railing">
        <div class="railing-top"></div>
        <div class="railing-bottom"></div>
        <div class="baluster" style="left:10px"></div>
        <div class="baluster" style="left:22px"></div>
        <div class="baluster" style="left:34px"></div>
        <div class="baluster" style="left:46px"></div>
        <div class="baluster" style="left:58px"></div>
        <div class="baluster" style="left:70px"></div>
        <div class="baluster" style="left:82px"></div>
        <div class="baluster" style="left:94px"></div>
        <div class="baluster" style="left:106px"></div>
      </div>
      <div class="veranda-floor"></div>
      <div class="steps">
        <div class="step step1"></div>
        <div class="step step2"></div>
        <div class="step step3"></div>
      </div>
    </div>

    <!-- Дерево -->
    <div class="tree">
      <div class="tree-top3"></div>
      <div class="tree-top2"></div>
      <div class="tree-top"></div>
      <div class="tree-trunk"></div>
    </div>

    <!-- МАМА -->
    <div class="person mom">
      <div class="head mom-head">
        <div class="hair mom-hair"></div>
        <div class="eye mom-eye1"></div>
        <div class="eye mom-eye2"></div>
        <div class="mouth mom-mouth"></div>
      </div>
      <div class="body mom-body">
        <div class="arm mom-arm-l"></div>
        <div class="arm mom-arm-r"></div>
      </div>
      <div class="mom-skirt"></div>
      <div class="legs">
        <div><div class="leg mom-leg"></div><div class="mom-shoe"></div></div>
        <div><div class="leg mom-leg"></div><div class="mom-shoe"></div></div>
      </div>
    </div>

    <!-- ДОЧКА 1 -->
    <div class="person daughter1">
      <div class="head d1-head">
        <div class="hair d1-hair"></div>
        <div class="eye d1-eye1"></div>
        <div class="eye d1-eye2"></div>
        <div class="mouth d1-mouth"></div>
      </div>
      <div class="body d1-body">
        <div class="arm d1-arm-l"></div>
        <div class="arm d1-arm-r"></div>
      </div>
      <div class="d1-skirt"></div>
      <div class="legs">
        <div><div class="leg d1-leg"></div><div class="d1-shoe"></div></div>
        <div><div class="leg d1-leg"></div><div class="d1-shoe"></div></div>
      </div>
    </div>

    <!-- ДОЧКА 2 -->
    <div class="person daughter2">
      <div class="head d2-head">
        <div class="hair d2-hair"></div>
        <div class="eye d2-eye1"></div>
        <div class="eye d2-eye2"></div>
        <div class="mouth d2-mouth"></div>
